<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>dashboard</title>
</head>
<body>
  <form id="exerciseForm">
    <input type="text" name="name" placeholder="exercise name" required />
    <input type="number" name="sets" placeholder="sets" required />
    <input type="number" name="reps" placeholder="reps" required />
    <input type="number" name="weight" placeholder="weight" required />
    <button type="submit">Add</button>
    <button type="submit">Delete</button>
  </form>

 <ul id="list"></ul>

  <script>
  async function apiFetch(url, options = {}) {
  const token = localStorage.getItem("token");

  const headers = {
    "Content-Type": "application/json",
    ...options.headers
  };

  if (token) {
    headers["Authorization"] = "Bearer " + token;
  }

  if (!token) {
    throw new Error("No token found. Please log in.");
    window.location.href = "/login.html";
  }

  const response = await fetch(url, {
    ...options,
    headers
  });

  return response.json();
}

  const form = document.getElementById("exerciseForm");

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const formData = new FormData(form);
  const data = Object.fromEntries(formData);

  data.name = data.name.trim();
  data.sets = Number(data.sets);
  data.reps = Number(data.reps);
  data.weight = Number(data.weight);
  data.date = new Date().toISOString();

  await apiFetch("/api/users/me/curr_training/exercises/", {
    method: "POST",
    body: JSON.stringify(data)
  });
  form.reset();
  loadExercises();
});


const deleteForm = document.getElementById("deleteForm");

deleteForm.addEventListener("submit", async (e) => {
  e.preventDefault();

  const formData = new FormData(deleteForm);
  const data = Object.fromEntries(formData);

  data.exerciseId = Number(data.exerciseId);
  data.name = data.name.trim();

  await apiFetch(`/api/users/me/exercises/${data.exerciseId}/`, {
    method: "DELETE"
  });
  deleteForm.reset();
  loadExercises();
});   


async function loadExercises() {
  const exercises = await apiFetch("/api/users/me/exercises/");

  const list = document.getElementById("list");
  list.innerHTML = "";

  exercises.forEach((ex) => {
    const li = document.createElement("li");

    li.textContent = `${ex.id} | ${ex.name} | ${ex.sets} sets x ${ex.reps} reps | ${ex.weight}kg | ${new Date(ex.date).toLocaleString()}`;

    list.appendChild(li);
  });
}

loadExercises();


</script>
</body>
</html>
