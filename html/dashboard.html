<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>dashboard</title>
</head>
<body>
  <form id="exerciseForm">
    <input type="text" name="name" placeholder="exercise name" required />
    <input type="number" name="sets" placeholder="sets" required />
    <input type="number" name="reps" placeholder="reps" required />
    <input type="number" name="weight" placeholder="weight" required />
    <button type="submit">Add</button>
  </form>

 <ul id="list"></ul>

  <script>
  async function apiFetch(url, options = {}) {
  const token = localStorage.getItem("token");

  const headers = {
    "Content-Type": "application/json",
    ...options.headers
  };

  if (token) {
    headers["Authorization"] = "Bearer " + token;
  }

  const response = await fetch(url, {
    ...options,
    headers
  });

  return response.json();
}

  const form = document.getElementById("exerciseForm");

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const formData = new FormData(form);
  const data = Object.fromEntries(formData);

  data.name = data.name.trim();
  data.sets = Number(data.sets);
  data.reps = Number(data.reps);
  data.weight = Number(data.weight);

  await apiFetch("/api/users/me/exercises/", {
    method: "POST",
    body: JSON.stringify(data)
  });

  form.reset();
});

</script>
</body>
</html>
